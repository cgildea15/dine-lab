<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineLab | Happy Hour Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🔥The Daily Dish</h1>
        <p>Deals on Demand | Eat Well for Less</p>
    </header>

    <main>
        <section id="filter-section" class="glass-card">
            <h3>🔍 Find a Deal</h3>
            <div class="filter-controls">
                <select id="filter-day">
                    <option value="">Any Day</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
                <input type="text" id="filter-city" placeholder="City">
                <button id="search-btn">Filter Deals</button>
            </div>
        </section>

        <section id="feed-section">
            <div id="results-container">
                </div>
        </section>

        <section id="lab-section" class="glass-card">
            <h3>Contribute Local Deal</h3>
            <form id="entry-form">
                <input type="text" id="res-name" placeholder="Restaurant Name" required>
                
                <div class="row">
                    <input type="text" id="res-city" placeholder="City">
                    <input type="text" id="res-zip" placeholder="Zip Code">
                </div>

                <input type="text" id="res-cuisine" placeholder="Cuisines (e.g. Italian, Pizza, Wings)">

                <div class="timing-box">
                    <h4>When is it active?</h4>
                    <div class="days-grid">
                        <label><input type="checkbox" class="day-check" value="Monday"> Mon</label>
                        <label><input type="checkbox" class="day-check" value="Tuesday"> Tue</label>
                        <label><input type="checkbox" class="day-check" value="Wednesday"> Wed</label>
                        <label><input type="checkbox" class="day-check" value="Thursday"> Thu</label>
                        <label><input type="checkbox" class="day-check" value="Friday"> Fri</label>
                        <label><input type="checkbox" class="day-check" value="Saturday"> Sat</label>
                        <label><input type="checkbox" class="day-check" value="Sunday"> Sun</label>
                    </div>
                    <div class="row time-row">
                        <label>Start: <input type="time" id="time-start"></label>
                        <label>End: <input type="time" id="time-end"></label>
                    </div>
                </div>
                
                <div id="deal-container">
                    <h4>Deals (Food & Drink)</h4>
                    <div class="deal-entry">
                        <input type="text" class="deal-title" placeholder="e.g. $5 Margaritas">
                        <input type="text" class="deal-details" placeholder="Details (Bar Only, etc.)">
                    </div>
                </div>
                <button type="button" id="add-deal-row">+ Add Another Item</button>
                
                <hr>
                <button type="submit" id="save-btn">Update</button>
            </form>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
